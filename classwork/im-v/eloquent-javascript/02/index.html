<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RSA</title>
        <style>
            body {
                margin: 0;
                transition: background-color 0.2s ease-in-out;
                background-repeat: no-repeat;
                background-size: cover;
                width: 100vw;
                height: 100vh;
                background-position: 50% 50%;
                font-family: Arial, Helvetica, sans-serif;
                display: grid;
                place-items: center;
                h1 {
                    font-size: 10rem;
                    color: white;
                }
            }
        </style>
    </head>
    <body>
        <h1>JOURNAL</h1>
    </body>
    <script>
        const mzimba = document.querySelector("body");
        const africanColours = ["red", "green", "yellow", "orange"];
        const index = Math.floor(Math.random() * africanColours.length);
        mzimba.style.backgroundColor = africanColours[index];
        mzimba.style.backgroundImage = `url('https://picsum.photos/1000/2000')`;
    </script>
</html>
